[tools]
actionlint = "1.7.12"
python = "3.13"
uv = "0.11.7"
helm = "4.1.3"
kubectl = "1.35.3"
kind = "0.32.0"
kubeconform = "0.8.0"
kyverno = "1.18.1"

[tasks.setup]
description = "Install Python dependencies for the chart-manager CLI."
run = "uv sync --extra dev"

[tasks.test]
description = "Run the Python unit test suite."
run = "uv run --extra dev pytest"

[tasks.charts]
description = "List known chart wrappers."
run = "uv run chart-manager charts list"

[tasks.deps]
description = "Show the install plan for a chart. Usage: mise run deps -- alloy --profile minimal"
run = "uv run chart-manager deps plan \"$@\""

[tasks.kind-test]
description = "Run a kind-backed chart test. Usage: mise run kind-test -- alloy --profile minimal"
run = "uv run chart-manager sandbox test \"$@\""

[tasks.sandbox-up]
description = "Bring up the long-lived sandbox cluster with the full observability stack (creates or starts the kind cluster)."
run = "uv run chart-manager sandbox up \"$@\""

[tasks.sandbox-down]
description = "Stop the sandbox kind cluster's containers. Preserves state; image cache and installed releases survive."
run = "uv run chart-manager sandbox down \"$@\""

[tasks.sandbox-delete]
description = "Delete the sandbox kind cluster entirely (full teardown; image cache and release state are lost)."
run = "uv run chart-manager sandbox delete \"$@\""

[tasks.validate]
description = "Run render + schema + policy. Usage: mise run validate -- --chart grafana --env dev"
run = "uv run chart-manager validate run \"$@\""

[tasks."validate:render"]
description = "Render one chart x env via helm template. Usage: mise run validate:render -- --chart grafana --env dev"
run = "uv run chart-manager validate render \"$@\""

[tasks."validate:schema"]
description = "Render then kubeconform-validate one chart x env."
run = "uv run chart-manager validate schema \"$@\""

[tasks."validate:policy"]
description = "Render -> schema -> kyverno policy for one chart x env."
run = "uv run chart-manager validate policy \"$@\""

[tasks."validate:clean"]
description = "Remove .chart-manager/rendered/ tree."
run = "uv run chart-manager validate clean"

[tasks."validate:deps-install"]
description = "Install helm (default + alternates), kubeconform, kyverno, uv via mise. Per-tool failures downgrade to warnings."
run = "uv run chart-manager validate deps-install"

[tasks.vuln-scan]
description = "Scan installed Python deps against PyPI's vulnerability database (pip-audit)."
run = "uv run pip-audit --skip-editable"
