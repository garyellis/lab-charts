apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: forbid-load-balancer
  annotations:
    policies.kyverno.io/title: Forbid LoadBalancer Services
    policies.kyverno.io/category: Networking
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Services must not use type LoadBalancer. Lab clusters expose traffic via
      the shared ingress gateway; LoadBalancer services bypass that path and
      allocate cloud resources that are not budgeted for here.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: service-type-not-load-balancer
      match:
        any:
          - resources:
              kinds:
                - Service
      validate:
        message: "Service type LoadBalancer is not allowed"
        pattern:
          spec:
            # Service.type is optional and defaults to ClusterIP. The equality
            # anchor validates it only when the manifest sets it explicitly.
            =(type): "!LoadBalancer"
