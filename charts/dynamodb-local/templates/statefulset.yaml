apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "dynamodb-local.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dynamodb-local.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "dynamodb-local.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dynamodb-local.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dynamodb-local.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dynamodb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: {{ .Values.dynamodb.workingDir | quote }}
          args:
            - -jar
            - DynamoDBLocal.jar
            {{- if .Values.dynamodb.sharedDb }}
            - -sharedDb
            {{- end }}
            - -dbPath
            - {{ .Values.dynamodb.dbPath | quote }}
          ports:
            - name: dynamodb
              containerPort: {{ .Values.dynamodb.port }}
              protocol: TCP
          {{- with .Values.extraEnv }}
          env:
            {{- range . }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          {{- end }}
          startupProbe:
            tcpSocket:
              port: dynamodb
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: dynamodb
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: dynamodb
            periodSeconds: 5
            failureThreshold: 12
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ printf "%s/data" .Values.dynamodb.workingDir | quote }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "dynamodb-local.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
