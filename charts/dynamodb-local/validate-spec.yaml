version: 1
release_name: dynamodb-local
namespace_template: "lab-${env}"
environments:
  dev:
    namespace: aws-dev
    values:
      - values.yaml
      - values-dev.yaml
  ci:
    values:
      - values.yaml
      - values-ci.yaml
triggers:
  "values.yaml":     [dev, ci]
  "values-dev.yaml": [dev]
  "values-ci.yaml":  [ci]
