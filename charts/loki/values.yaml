global:
  storageClass: "csi-cinder-sc-delete"

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
      enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 30d
  compactor:
    retention_enabled: true
    delete_request_store: s3
    working_directory: /var/loki/retention
  rulerConfig:
    enable_api: true
    alertmanager_url: http://mimir-gateway.observability.svc/alertmanager
    external_url: http://loki-gateway.observability.svc/ruler
    
  persistence:
    size: 20Gi
    storageClass: csi-cinder-sc-delete

chunksCache:
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/data: ""
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/data
      operator: Exists
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "csi-cinder-sc-delete"
  allocatedMemory: 1024  # MB
  resources:
    requests:
      cpu: 100m
      memory: 1536Mi  # 1.5GB
    limits:
      cpu: 500m
      memory: 1536Mi

resultsCache:
  nodeSelector:
    node-role.kubernetes.io/data: ""
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/data
      operator: Exists

minio:
  fullnameOverride: "loki-minio"
  enabled: true
  nodeSelector:
    node-role.kubernetes.io/data: ""
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/data
      operator: Exists
  persistence:
    storageClass: "csi-cinder-sc-delete"
    size: 50Gi
  rootUser: grafana-loki
  rootPassword: supersecret
  serviceAccount:
    create: true
    name: "mimir-minio-sa"  # ← Custom SA name

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/data: ""
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/data
      operator: Exists
  persistence:
    size: 10Gi
    storageClass: "csi-cinder-sc-delete"

gateway:
  nodeSelector:
    node-role.kubernetes.io/data: ""
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/data
      operator: Exists

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

