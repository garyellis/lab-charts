loki:
  global:
    storageClass: standard

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    pattern_ingester:
      enabled: true
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 30d
    compactor:
      retention_enabled: true
      delete_request_store: s3
      working_directory: /var/loki/retention
    rulerConfig:
      enable_api: true
      alertmanager_url: http://mimir-distributed-gateway.observability.svc/alertmanager
      external_url: http://loki-gateway.observability.svc/ruler

  chunksCache:
    replicas: 1
    nodeSelector: {}
    tolerations: []
    allocatedMemory: 256
    resources:
      requests:
        cpu: 25m
        memory: 384Mi
      limits:
        cpu: 250m
        memory: 384Mi
    persistence:
      enabled: true
      storageClass: standard
      storageSize: 3Gi

  resultsCache:
    nodeSelector: {}
    tolerations: []
    allocatedMemory: 128
    resources:
      requests:
        cpu: 25m
        memory: 192Mi
      limits:
        cpu: 250m
        memory: 192Mi

  minio:
    fullnameOverride: loki-minio
    enabled: true
    address: loki-minio.observability.svc:9000
    nodeSelector: {}
    tolerations: []
    persistence:
      storageClass: standard
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
    rootUser: grafana-loki
    rootPassword: supersecret
    serviceAccount:
      create: true
      name: loki-minio-sa

  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    nodeSelector: {}
    tolerations: []
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    persistence:
      storageClass: standard
      size: 2Gi

  gateway:
    nodeSelector: {}
    tolerations: []
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomCompactor:
    replicas: 0
  bloomGateway:
    replicas: 0
