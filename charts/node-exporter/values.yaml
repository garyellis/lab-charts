# helm/values/node-exporter.yaml
# Prometheus Node Exporter 1.10.2 - System Metrics
# ============================================================================
# Exports hardware and OS metrics from Kubernetes nodes
# Scraped by Alloy via ServiceMonitor and sent to Mimir

# ServiceMonitor for automatic discovery by Alloy
# Alloy's prometheus.operator.servicemonitors component will discover this
prometheus:
  monitor:
    enabled: true
    # Default labels are sufficient for Alloy discovery
    # additionalLabels: {}

    # Scrape interval
    interval: 30s

    # Scrape timeout
    scrapeTimeout: 10s

# Resource limits for the DaemonSet
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Host networking and PID namespace required for accurate system metrics
hostNetwork: true
hostPID: true

# Tolerations to run on all nodes including control plane
tolerations:
  - operator: Exists

# Service configuration
service:
  type: ClusterIP
  port: 9100
  targetPort: 9100

# Update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

