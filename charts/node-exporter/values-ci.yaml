prometheus-node-exporter:
  prometheus:
    monitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s

  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

  hostNetwork: true
  hostPID: true

  tolerations:
    - operator: Exists

  service:
    type: ClusterIP
    port: 9100
    targetPort: 9100

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
