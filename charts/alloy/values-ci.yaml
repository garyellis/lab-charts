---
# This chart is a dependency wrapper. Values for the vendored Grafana Alloy chart
# must be nested under the dependency name (`alloy`) to affect rendered resources.
alloy:
  controller:
    type: deployment
    replicas: 1
    hostPID: false
    hostNetwork: false
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    podDisruptionBudget:
      enabled: false
    autoscaling:
      enabled: false
      horizontal:
        enabled: false
      vertical:
        enabled: false

  global:
    podSecurityContext:
      fsGroup: 473

  alloy:
    enableReporting: false
    clustering:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    securityContext:
      runAsUser: 473
      runAsGroup: 473
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    mounts:
      varlog: false
      dockercontainers: false
      extra: []
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
    configMap:
      create: true
      content: |-
        logging {
          level  = "info"
          format = "logfmt"
        }

        prometheus.operator.servicemonitors "servicemonitors" {
          forward_to = [prometheus.remote_write.mimir.receiver]

          clustering {
            enabled = false
          }
        }

        prometheus.operator.podmonitors "podmonitors" {
          forward_to = [prometheus.remote_write.mimir.receiver]

          clustering {
            enabled = false
          }
        }

        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
            action        = "keep"
            regex         = "true"
          }

          rule {
            source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
            action        = "replace"
            target_label  = "__address__"
            regex         = "([^:]+)(?::\\d+)?;(\\d+)"
            replacement   = "$1:$2"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
            action        = "replace"
            target_label  = "__metrics_path__"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
        }

        prometheus.scrape "pods" {
          targets    = discovery.relabel.pods.output
          forward_to = [prometheus.remote_write.mimir.receiver]
        }

        prometheus.remote_write "mimir" {
          endpoint {
            url = "http://mimir-distributed-gateway.observability.svc/api/v1/push"
          }
        }

        discovery.kubernetes "pods_logs" {
          role = "pod"
        }

        discovery.relabel "pods_logs" {
          targets = discovery.kubernetes.pods_logs.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            action        = "keep"
            regex         = "Running"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_controller_name"]
            target_label  = "workload"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_controller_kind"]
            target_label  = "workload_kind"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "service_name"
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pods_logs.output
          forward_to = [loki.process.add_static_labels.receiver]
        }

        loki.process "add_static_labels" {
          stage.static_labels {
            values = {
              cluster = "kind",
            }
          }

          forward_to = [loki.write.loki.receiver]
        }

        loki.write "loki" {
          endpoint {
            url = "http://loki-gateway.observability.svc/loki/api/v1/push"
          }
        }

        otelcol.receiver.otlp "default" {
          grpc { endpoint = "0.0.0.0:4317" }
          http { endpoint = "0.0.0.0:4318" }
          output {
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "tempo.observability.svc:4317"
            tls { insecure = true }
          }
        }

  configReloader:
    resources:
      requests:
        cpu: 10m
        memory: 50Mi
      limits:
        cpu: 50m
        memory: 64Mi

  service:
    enabled: true
    type: ClusterIP
    internalTrafficPolicy: Cluster

  serviceMonitor:
    enabled: true

  rbac:
    create: true

  serviceAccount:
    create: true
