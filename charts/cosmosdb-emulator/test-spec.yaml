version: 1

profiles:
  minimal:
    description: Install the Cosmos DB emulator with the Istio VirtualService CRD available and wait for the emulator readiness endpoint.
    namespace: azure-dev
    requires:
      - chart: istio-base
        profile: minimal
    values:
      - values.yaml
      - values-ci.yaml
    helmTest: true
    checks:
      - name: emulator-ready
        type: helm-test
        description: Poll the emulator /ready endpoint through the in-cluster service.
    timeout: 15m

  routed:
    description: Install the emulator behind the shared apps gateway so it is callable through its VirtualService host.
    namespace: azure-dev
    requires:
      - chart: istio-gateway
        profile: minimal
    values:
      - values.yaml
      - values-ci.yaml
    helmTest: true
    checks:
      - name: emulator-ready
        type: helm-test
        description: Poll the emulator /ready endpoint through the in-cluster service.
    timeout: 20m

reverseTests: []
