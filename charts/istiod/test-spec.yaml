version: 1

profiles:
  minimal:
    description: Install istiod on top of istio-base and validate the control plane.
    namespace: istio-system
    requires:
      - chart: istio-base
        profile: minimal
    values:
      - values.yaml
      - values-ci.yaml
    helmTest: true
    checks:
      - name: istiod-ready
        type: helm-test
        description: Verify the istiod Deployment is Available and the sidecar-injector / validating webhooks are registered.
    timeout: 10m

reverseTests:
  - chart: istio-gateway
    profile: minimal
