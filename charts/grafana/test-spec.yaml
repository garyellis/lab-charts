version: 1

profiles:
  minimal:
    description: Install Grafana with CI-local values. Requires istio-base for the VirtualService CRD.
    requires:
      - chart: istio-base
        profile: minimal
    values:
      - values.yaml
      - values-ci.yaml
    helmTest: true
    timeout: 10m

  with-deps:
    description: Install Grafana with LGTM datasources available.
    requires:
      - chart: istio-base
        profile: minimal
      - chart: mimir-distributed
        profile: minimal
      - chart: loki
        profile: minimal
      - chart: tempo
        profile: minimal
    values:
      - values.yaml
      - values-ci.yaml
    helmTest: true
    timeout: 15m

reverseTests: []
