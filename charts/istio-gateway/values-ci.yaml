---
# CI overlay: single-node kind cluster.
# Override the openstack defaults in values.yaml: switch the Service from
# LoadBalancer to ClusterIP (kind has no LB controller), wipe the edge
# node selector/tolerations (kind nodes are not labeled/tainted that way),
# drop podAntiAffinity (only one node), scale to a single replica, and
# trim resources.
#
# nodeSelector is wiped via `~` (null) so the subchart's
# `{{ with .Values.nodeSelector }}` block is skipped entirely. The helm
# runner applies --skip-schema-validation for wrapper installs (see
# src/chart_manager/integrations/helm.py) because the gateway subchart's
# values.schema.json forbids null at these paths.
#
# Note: service.annotations stays as `{}` (cannot be null — the upstream
# template calls deepCopy on it, which panics on null). Helm deep-merges
# maps, so the loadbalancer.openstack.org/* annotations remain on the
# Service object, but they are inert metadata on a ClusterIP Service in
# kind (no openstack cloud-controller-manager exists to interpret them).

# Apps-tier ingress domain. *.localhost is special-cased by major
# browsers (Chrome/Safari/Edge) to resolve to 127.0.0.1 per RFC 6761; no
# /etc/hosts edits needed for the browser path. Firefox needs
# `network.dns.localDomains = "localhost"` in about:config. For CLI
# tools (curl/k6) on macOS, add an /etc/hosts entry per service.
appsDomain: kind.local
appsHosts:
  - "*.kind.local"

gateway:
  replicaCount: 1

  service:
    # NodePort so the kind extraPortMappings can punch 30080->80 and
    # 30443->443 through to the host (see kind-config.yaml). Targets
    # 8080/8443 are the istio-proxy listener ports fixed by the
    # upstream subchart.
    type: NodePort
    # Required when downgrading from LoadBalancer (values.yaml default):
    # the field is only valid on externally-accessible Services and must
    # be wiped, not deep-merged.
    externalTrafficPolicy: null
    annotations: {}
    ports:
      - name: status-port
        port: 15021
        protocol: TCP
        targetPort: 15021
      - name: http2
        port: 80
        nodePort: 30080
        protocol: TCP
        targetPort: 8080
      - name: https
        port: 443
        nodePort: 30443
        protocol: TCP
        targetPort: 8443

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  nodeSelector: ~
  tolerations: []
  affinity: {}

routes:
  # Cross-cutting hubble route's default host is *.kind.local which
  # doesn't match the *.localhost wildcard cert. Disabled here; add a
  # hubble.localhost VS later if/when we want it on this path.
  hubbleUi:
    hosts:
      - hubble.kind.local
    enabled: true
