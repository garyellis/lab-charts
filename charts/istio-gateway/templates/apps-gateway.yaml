---
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: apps-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    istio: gateway-internal
  servers:
    - hosts:
      {{- range .Values.appsHosts }}
        - {{ . | quote }}
      {{- end }}
      port:
        name: http
        number: 80
        protocol: HTTP
      tls:
        httpsRedirect: true
    - hosts:
      {{- range .Values.appsHosts }}
        - {{ . | quote }}
      {{- end }}
      port:
        name: https
        number: 443
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: apps-wildcard-cert
