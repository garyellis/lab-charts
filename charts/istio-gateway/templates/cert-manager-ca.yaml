---
# 1. Bootstrap Issuer (cluster-scoped: signs the Root CA)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab
spec:
  selfSigned: {}
---
# 2. The Root CA Certificate.
# Pinned to the cert-manager namespace because the lab-ca-issuer ClusterIssuer
# (below) references lab-root-ca-secret, and cert-manager resolves
# ClusterIssuer-referenced Secrets from its --cluster-resource-namespace
# (defaults to its own install namespace = cert-manager).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "Lab Root CA"
  secretName: lab-root-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: lab
    kind: ClusterIssuer
    group: cert-manager.io
---
# 3. The CA ClusterIssuer (cluster-scoped: signs app certs)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca-issuer
spec:
  ca:
    secretName: lab-root-ca-secret
---
# 4. The Leaf Certificate consumed by the gateway as credentialName.
# Must live in the same namespace as the gateway Deployment so the
# Secret is mounted by the proxy. dnsNames are derived from
# .Values.appsDomain so kind (kind.local) and openstack
# (k8s.home.lab.io) overlays produce SANs that match the corresponding
# VirtualService hosts.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: apps-wildcard
  namespace: {{ .Release.Namespace }}
spec:
  secretName: apps-wildcard-cert
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer
  commonName: "*.{{ .Values.appsDomain }}"
  dnsNames:
    - "*.{{ .Values.appsDomain }}"
    - "{{ .Values.appsDomain }}"
