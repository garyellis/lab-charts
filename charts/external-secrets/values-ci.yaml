---
# CI overlay: keep the local kind install small while exercising the controller,
# webhook, certificate controller, and bundled CRDs.
external-secrets:
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

  webhook:
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi

  certController:
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi
