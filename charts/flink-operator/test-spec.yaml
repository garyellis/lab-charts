version: 1

profiles:
  minimal:
    description: Install the Flink Kubernetes Operator with a sample FlinkDeployment and verify both become ready.
    namespace: flink-operator
    requires: []
    values:
      - values.yaml
      - values-ci.yaml
    helmTest: true
    checks:
      - name: control-plane-ready
        type: helm-test
        description: Wait for the flink-kubernetes-operator deployment to become available.
      - name: crds-installed
        type: helm-test
        description: Verify the Flink operator CRDs exist.
      - name: flinkdeployment-ready
        type: helm-test
        description: Wait for the sample FlinkDeployment job manager to report READY.
    timeout: 15m

reverseTests: []
