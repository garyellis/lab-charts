{{- $testName := printf "%s-test" .Release.Name -}}
{{- $readyTestName := printf "%s-control-plane-ready" .Release.Name -}}
{{- $crdTestName := printf "%s-crds-installed" .Release.Name -}}
{{- $kafkaReadyTestName := printf "%s-kafka-ready" .Release.Name -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $testName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $testName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkas"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $testName }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $testName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ $testName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $testName }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $testName }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ $testName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $testName }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ $readyTestName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  serviceAccountName: {{ $testName }}
  restartPolicy: Never
  containers:
    - name: kubectl
      image: registry.k8s.io/kubectl:v1.36.2
      command:
        - kubectl
        - wait
        - deployment/strimzi-cluster-operator
        - --for=condition=Available
        - --namespace={{ .Release.Namespace }}
        - --timeout=180s
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ $crdTestName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  serviceAccountName: {{ $testName }}
  restartPolicy: Never
  containers:
    - name: kubectl
      image: registry.k8s.io/kubectl:v1.36.2
      command:
        - kubectl
        - get
        - crd
        - kafkas.kafka.strimzi.io
        - kafkanodepools.kafka.strimzi.io
        - kafkatopics.kafka.strimzi.io
        - kafkausers.kafka.strimzi.io
        - kafkaconnects.kafka.strimzi.io
        - kafkaconnectors.kafka.strimzi.io
        - kafkabridges.kafka.strimzi.io
        - kafkamirrormaker2s.kafka.strimzi.io
        - kafkarebalances.kafka.strimzi.io
        - strimzipodsets.core.strimzi.io
{{- if .Values.kafkaCluster.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ $kafkaReadyTestName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  serviceAccountName: {{ $testName }}
  restartPolicy: Never
  containers:
    - name: kubectl
      image: registry.k8s.io/kubectl:v1.36.2
      command:
        - kubectl
        - wait
        - kafka/{{ .Values.kafkaCluster.name }}
        - --for=condition=Ready
        - --namespace={{ .Release.Namespace }}
        - --timeout=600s
{{- end }}
