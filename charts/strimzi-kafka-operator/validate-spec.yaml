version: 1
release_name: strimzi-kafka-operator
namespace_template: "lab-${env}"
environments:
  ci:
    namespace: strimzi-kafka-operator
    values:
      - values.yaml
      - values-ci.yaml
triggers:
  "Chart.yaml":     [ci]
  "values.yaml":    [ci]
  "values-ci.yaml": [ci]
  "templates/**":   [ci]
